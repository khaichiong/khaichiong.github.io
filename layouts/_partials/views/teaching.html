{{ $item := .item }}
{{ $summary := partial "functions/get_summary" $item }}

<article class="rounded-lg border border-zinc-200 bg-white p-6 shadow-sm transition-colors hover:border-primary-300 dark:border-zinc-800 dark:bg-zinc-900 dark:hover:border-primary-700">
  <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
    <div class="min-w-0">
      {{ with $item.Params.content_meta.difficulty }}
        <p class="mb-2 text-sm font-medium text-zinc-500 dark:text-zinc-400">{{ . }} course</p>
      {{ end }}
      <h3 class="text-xl font-semibold leading-tight text-zinc-900 dark:text-zinc-100">
        <a class="hover:text-primary-600 dark:hover:text-primary-400" href="{{ $item.RelPermalink }}">
          {{ $item.Title }}
        </a>
      </h3>
      {{ with $summary }}
        <p class="mt-2 text-base leading-relaxed text-zinc-600 dark:text-zinc-400">{{ . | plainify | htmlUnescape }}</p>
      {{ end }}
    </div>
    <a class="inline-flex shrink-0 items-center gap-1 text-sm font-medium text-primary-600 hover:text-primary-700 dark:text-primary-400 dark:hover:text-primary-300" href="{{ $item.RelPermalink }}">
      <span>View materials</span>
      <svg class="h-4 w-4" aria-hidden="true" fill="none" viewBox="0 0 16 16">
        <path d="M6.75 5.75 9.25 8l-2.5 2.25" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
      </svg>
    </a>
  </div>
</article>
